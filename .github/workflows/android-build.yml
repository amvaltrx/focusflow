name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Install Dependencies & Build Web App
      working-directory: frontend
      run: |
        npm install --legacy-peer-deps
        npm run build

    - name: Sync Capacitor Android
      working-directory: frontend
      run: npx cap sync android

    - name: Build Android APK
      working-directory: frontend/android
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build.log
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo '```text' > issue_body.md
          tail -n 100 build.log >> issue_body.md
          echo '```' >> issue_body.md
          gh issue create --repo amvaltrx/focusflow --title "Build Failed: Gradle Log" --body-file issue_body.md
          exit 1
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FocusFlow-Android-App
        path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
